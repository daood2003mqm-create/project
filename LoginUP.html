<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title> Create New Account</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login"> <div>
        <h2>Create New Account</h2>
        <form onsubmit="event.preventDefault(); handlelogin();">
            <input type="text" id="Username" class="my-input" placeholder="Username (Used for Login)" required>
            <input type="text" id="FullName" class="my-input" placeholder="Full Name" required>
            <input type="email" id="Email" class="my-input" placeholder="Email Address" required>
            <input type="password" id="Password" class="my-input" placeholder="Password" required>
            <input type="submit" value="login Now" class="btn-submit">
        </form>
        
        <div>
            <a href="Login.html">Back to Login</a>
        </div>
    </div>

    <script>
        function handlelogin() {
            let username = document.getElementById('Username').value.trim();
            let fullName = document.getElementById('FullName').value.trim();
            let email = document.getElementById('Email').value.trim();
            let password = document.getElementById('Password').value;

            // تجميع البيانات في كائن (Object) واحد
            let userData = {
                username: username,
                fullName: fullName,
                email: email,
                password: password
            };

            // حفظ الكائن في الـ localStorage بصيغة نصية JSON
            localStorage.setItem('libraryUser', JSON.stringify(userData));

            alert("Account Created Successfully!");
            window.location.href = "Login.html"; // إعادته تلقائياً لصفحة الدخول ليجرب حسابه الجديد
        }
    </script>
</body>
</html>
